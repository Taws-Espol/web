services:
  postgres:
    image: postgres:18-alpine3.22
    container_name: taws_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - taws_postgres_data:/var/lib/postgresql
    healthcheck:
      test: [
        "CMD-SHELL",
        "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
      ] 
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  taws_postgres_data:
